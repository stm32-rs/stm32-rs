_svd: ../svd/stm32wb07.svd

_clear_fields: "*"

_derive:
  I2C2: I2C1

ADC: {}

BLUE: {}

CRC:
  _strip: CRC_
  _include:
    - patches/crc/crc_rename_init.yaml
    - patches/crc/add_dr8.yaml
    - fields/crc/v3_idr32.yaml

DMA:
  _strip: DMA_
  _include:
    - patches/dma/wb0.yaml
    - fields/dma/v1.yaml
    - collect/dma/v1.yaml

DMAMUX:
  _array:
    C?CR: {}
  _include:
    - fields/dma/dmamux/wb06.yaml

FLASH_CTRL: {}

GLOBALSTATMACH: {}

GPIOA:
  _strip: GPIOA_
  _include:
    - patches/gpio/rm_r_suffix.yaml
    - fields/gpio/gpio_l5_u5.yaml
    - collect/gpio/v2r.yaml

GPIOB:
  _include:
    - patches/gpio/add_pin8-11.yaml
    - fields/gpio/gpio_l5_u5.yaml
    - collect/gpio/v2r.yaml

GPIO[A]:
  _include: collect/gpio/gpioa_afsel.yaml
GPIO[B]:
  _include: collect/gpio/v2r_derive.yaml

I2C1:
  _strip: I2C_
  _include:
    - fields/i2c/v2.yaml
  CR1:
    delete: WUPEN

IWDG:
  _strip: IWDG_
  _include:
    - patches/16bit.yaml
    - fields/iwdg/iwdg_with_WINR.yaml

LPUART: {}

PKA:
  _strip: PKA_

PWRC: {}

RADIO:
  _strip: RADIO_

RADIO_CONTROL:
  _strip: RADIO_CONTROL_

RCC: {}

RNG:
  _strip: RNG_

RRM: {}

RTC:
  _strip: RTC_

SPI[123]:
  _strip: SPI?_

SYSTEM_CTRL: {}

TIM1: {}

USART:
  _strip: USART_

WAKEUP:
  _strip: WAKEUP_

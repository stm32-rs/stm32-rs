_svd: ../svd/stm32l552.svd

_modify:
  cpu:
    name: CM33
    revision: r0p1
    endian: little
    mpuPresent: "true"
    fpuPresent: "true"
    nvicPrioBits: 3
    vendorSystickConfig: "false"

FMC:
  _strip:
    - "FMC_"

DAC:
  _strip:
    - "DAC_"

RNG:
  _strip:
    - "RNG_"

GTZC_MPCBB1:
  _strip:
    - "MPCBB1_"

GTZC_MPCBB2:
  _strip:
    - "MPCBB2_"

GTZC_TZIC:
  _strip:
    - "TZIC_"

GTZC_TZSC:
  _strip:
    - "TZSC_"

SPI?:
  _include:
    - common_patches/16bit.yaml
    - common_patches/spi/dr8.yaml

"TIM*":
  _include:
    - common_patches/tim/omp.yaml
    - common_patches/tim/icpsc.yaml

TIM4:
  _delete:
    _interrupts:
      - TIM5

TIM5:
  _add:
    _interrupts:
      TIM5:
        description: TIM5 global interrupt
        value: 48

TIM15:
  CCMR1_Output:
    _modify:
      OC1M_bit3:
        name: OC1M_3

"TIM[18]":
  _include:
    - common_patches/tim/v2/ocm_bit3.yaml
    - common_patches/tim/v2/oc5m_bit3.yaml

"TIM[234]":
  _include: common_patches/tim/v2/ocm_bit3.yaml

UCPD1:
  _include:
    - common_patches/ucpd/rxordseten_split.yaml
    - common_patches/ucpd/cfgr_missing_r.yaml
    - common_patches/ucpd/tx_rx_missing_r.yaml
    - ../peripherals/ucpd/ucpd_v1.yaml

_include:
 - collect/dma/dmamux.yaml
 - common_patches/dma/interrupt_names.yaml
 - collect/dma/l5.yaml
 - collect/flash/secbbr.yaml
 - common_patches/icache/l5.yaml
 - collect/icache/crr.yaml
 - ../peripherals/gpio/gpio_l5_u5.yaml
 - ../peripherals/rcc/rcc_l5.yaml
 - common_patches/rtc/alarm.yaml
 - collect/rtc/tamp_bkpr.yaml
 - collect/rtc/alarm.yaml
 - common_patches/sai/sai_v1.yaml
 - ../peripherals/sai/sai.yaml
 - collect/sai/ch.yaml
 - collect/sai/pdm.yaml
 - common_patches/tim/group.yaml
 - ../peripherals/tim/v2/ccm.yaml
 - common_patches/adc/adc_common_group_name.yaml

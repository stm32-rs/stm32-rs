_copy:
  TIM3:
    from: TIM2

_derive:
  TIM4: TIM3

"TIM[123]":
  _include: oc5m_bit3.yaml

TIM2:
  CNT:
    _modify:
      CNT:
        bitWidth: 32
  ARR:
    _modify:
      ARR:
        bitWidth: 32
  CCR?:
    _modify:
      CCR?:
        name: CCR
        bitWidth: 32

"TIM[13],TIM15,TIM16":
  CNT:
    _modify:
      CNT:
        bitWidth: 16
  ARR:
    _modify:
      ARR:
        bitWidth: 20
  CCR?:
    _modify:
      CCR?:
        bitWidth: 20
